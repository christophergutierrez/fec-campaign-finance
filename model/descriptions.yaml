# descriptions.yaml — human-curated descriptions + gotchas for the FEC DB.
#
# This is the SOURCE OF TRUTH for prose. Column TYPES, ROW COUNTS and the actual
# column list are read live from the database by bin/gen_dict.py — so this file only
# holds the "why", never the "what". A column documented here but absent from the
# DB (or vice-versa) is flagged by the generator, so drift is visible.
#
# Edit freely, then regenerate:  bin/gen_dict.py

database:
  name: fec_campaign_finance.db
  overview: |
    Local FEC campaign-finance database for the **2026 election cycle** (House +
    Senate, some presidential). A DuckDB star schema: two dimension tables
    (entities), one bridge, one classification hook, and three fact tables (money
    flows). Built from FEC bulk data by `bin/ingest.py`; treat as read-only (the one
    exception is `dim_group_mappings`, written by `bin/load_interests.py`).

    Every curated table is backed by a lossless `parquet_store/raw_*.parquet`
    "cold storage" file that preserves every original FEC column as text. Columns
    dropped or renamed in the curated tables (e.g. MEMO_CD) can be recovered there.

# Cross-cutting traps. These are the real reason this dictionary exists — none of
# them are discoverable from column names.
gotchas:
  - title: The two contribution fact tables have DIFFERENT join keys
    detail: |
      `fact_contributions` is committee->candidate: join SOURCE_CMTE_ID and
      TARGET_CAND_ID. `fact_individual_contributions` is individual->committee:
      join TARGET_CMTE_ID (NOT "CMTE_ID"); the donor is free-text CONTRIBUTOR_NAME,
      not an id. Mixing the keys silently returns wrong/empty joins.
  - title: fact_contributions secretly contains independent-expenditure money
    detail: |
      itpas2 mixes transaction types. TRANSACTION_TP 24K is a real direct
      contribution; 24E is an independent expenditure FOR the candidate and 24A is
      one AGAINST. The 24E/24A rows OVERLAP fact_independent_expenditures, so
      adding the two tables double-counts IE. For true direct money filter
      TRANSACTION_TP NOT IN ('24E','24A','24C','24N'); for IE use the dedicated
      table only.
  - title: Independent expenditures need an amendment + junk filter
    detail: |
      fact_independent_expenditures raw sum is ~$39B because of bogus self-filings
      (e.g. "$9B from Warren Buffett"). Always filter AMNDT_IND='N' (original
      filings) AND join to dim_committees to exclude garbage; clean total is
      ~$595M. Same-filing duplicate lines still slip through AMNDT_IND='N' — true
      dedup needs the prev_file_num/file_num supersede chain.
  - title: IE ties to a candidate are declarative, support != benefit
    detail: |
      An IE never pays the candidate; money goes to a vendor (PAYEE). The link is
      the filer's self-declared TARGET_CAND_ID + SUPPORT_OPPOSE. A SUPPORT_OPPOSE='O'
      row is tied to the candidate it ATTACKS (it benefits the unnamed opponent).
      Always group support ('S') and oppose ('O') separately; never sum AMOUNT
      across both as if it were one quantity.
  - title: Conduit earmark double-counting (ActBlue / WinRed)
    detail: |
      The largest "committees" by individual dollars are pass-through conduits.
      Earmarked giving creates paired rows: the conduit's real receipt (15) and a
      memo on the recipient's report (15E, MEMO_CD='X'). The executable SQL layer's
      clean individual view reads raw_indiv.parquet and filters MEMO_CD <> 'X' OR
      MEMO_CD IS NULL.
  - title: Negative amounts and messy free text
    detail: |
      AMOUNT can be negative (refunds/redesignations) — decide whether to include.
      CONTRIBUTOR_NAME, EMPLOYER, CMTE_NM are free text with variant spellings; use
      ILIKE and expect dupes. There are no canonical donor ids in bulk data.
  - title: One cycle per generated store
    detail: Everything in the current generated store is 2026. Other cycles require a fresh generated store (`bin/ingest.py --cycle YYYY` refuses to mix with an existing cycle).

tables:
  dim_candidates:
    grain: one row per candidate (PK CAND_ID)
    description: Candidate master — everyone who filed to run in the cycle (incumbents, challengers, withdrawn).
    columns:
      CAND_ID: "PK. FEC candidate id; first char encodes office (H/S/P), e.g. H8TX22107, S0KY00091."
      CAND_NAME: "Candidate name, 'LAST, FIRST' free text."
      CAND_PTY_AFFILIATION: "Party code: DEM, REP, IND, LIB, GRE, … (free-ish text)."
      CAND_ELECTION_YR: "Year of the election this filing targets."
      CAND_OFFICE_ST: "State of the office sought (the constituency). For President = 'US'."
      CAND_OFFICE: "H House · S Senate · P President."
      CAND_OFFICE_DISTRICT: "House district ('01'..); '00' for Senate/at-large."
      CAND_ICI: "Incumbency: I incumbent · C challenger · O open seat."
      CAND_STATUS: "Candidacy status (C statutory candidate, F future, N not yet, P prior)."
      CAND_PCC: "CMTE_ID of the principal campaign committee."

  dim_committees:
    grain: one row per committee (PK CMTE_ID)
    description: Committee master — PACs, party committees, candidate campaign committees, super PACs.
    columns:
      CMTE_ID: "PK. FEC committee id, e.g. C00401224."
      CMTE_NM: "Committee name (free text)."
      CMTE_TP: "Type: H/S/P candidate cmte · Q qualified PAC · N non-qualified PAC · O super PAC (IE-only) · V/W hybrid · X/Y party · I IE filer · U single-candidate IE."
      CMTE_DSGN: "Designation: P principal · A authorized · J joint fundraiser · U unauthorized (most PACs) · B lobbyist/registrant PAC."
      CMTE_PTY_AFFILIATION: "Committee's party affiliation, if any."
      ORG_TP: "Organization type (C corp, L labor, M membership, T trade, V cooperative, W corp w/o stock)."
      CONNECTED_ORG_NM: "Sponsoring/connected organization name (free text)."
      AFFILIATED_CAND_ID: "Candidate this committee is affiliated with, if any."

  bridge_candidate_committee:
    grain: one row per candidate<->committee linkage
    description: Many-to-many link between candidates and their committees (from FEC ccl). Use to roll individual money (which lands on committees) up to a candidate.
    columns:
      CAND_ID: "Candidate side of the link (-> dim_candidates.CAND_ID)."
      CMTE_ID: "Committee side of the link (-> dim_committees.CMTE_ID)."
      FEC_ELECTION_YR: "Election year of the linkage."
      CMTE_TP: "Committee type at time of linkage (denormalized from dim_committees)."
      CMTE_DSGN: "Committee designation at time of linkage."
      LINKAGE_ID: "FEC linkage record id."

  dim_group_mappings:
    grain: one row per committee that has been tagged
    description: |
      Curated committee -> interest-group classification. Populated by
      bin/load_interests.py from model/committee_interests.csv (the editable source
      of truth), NOT by bin/ingest.py. Left-join to fact tables to group by interest.
    columns:
      CMTE_ID: "Tagged committee (-> dim_committees.CMTE_ID)."
      custom_category: "Interest label; stance is encoded in it (e.g. 'Israel-aligned' vs 'Israel-dovish (J Street)' vs 'Israel-critical (anti-AIPAC)') so opposed groups are never summed together."
      notes: "Free-text note: which group/why, or provenance."

  fact_contributions:
    grain: one row per committee->candidate transaction (PK SUB_ID)
    description: |
      Money from committees TO candidates (FEC itpas2). NOTE this includes
      independent-expenditure rows (24E/24A) — see the IE-overlap gotcha; it is NOT
      purely direct contributions.
    columns:
      SUB_ID: "PK. Verified-unique FEC submission id."
      SOURCE_CMTE_ID: "Giving/spending committee (-> dim_committees.CMTE_ID)."
      TARGET_CAND_ID: "Recipient/target candidate (-> dim_candidates.CAND_ID)."
      AMOUNT: "Transaction amount. Negative = refund/redesignation."
      TRANSACTION_DT: "Transaction date."
      TRANSACTION_TP: "Type: 24K direct contribution · 24E IE FOR · 24A IE AGAINST · 24C/24N coordinated party exp · 11 etc."
      ENTITY_TP: "Entity type of the source (PAC, PTY, CCM, …)."
      OTHER_ID: "Linked entity id (counterparty), filer-dependent."
      IMAGE_NUM: "FEC image (scanned filing) number."
      FILE_NUM: "FEC file number of the filing."
      TRAN_ID: "Filer-assigned transaction id (unique only within a filing)."

  fact_individual_contributions:
    grain: one row per individual->committee itemized contribution (PK SUB_ID)
    description: |
      Itemized donations from individuals TO committees (FEC itcont), 25M+ rows.
      Includes conduit earmark memo rows — see the ActBlue/WinRed gotcha. MEMO_CD
      is NOT here; it lives in raw_indiv.parquet.
    columns:
      SUB_ID: "PK. Verified-unique FEC submission id."
      TARGET_CMTE_ID: "Recipient committee (-> dim_committees.CMTE_ID). NOT named CMTE_ID."
      CONTRIBUTOR_NAME: "Donor name, free text (no canonical id)."
      CITY: "Donor city."
      STATE: "Donor state (2-letter). Best available 'is this a constituent' proxy."
      ZIP_CODE: "Donor ZIP."
      EMPLOYER: "Donor employer, free text (industry analysis via ILIKE)."
      OCCUPATION: "Donor occupation, free text."
      AMOUNT: "Contribution amount. Negative = refund."
      TRANSACTION_DT: "Contribution date."
      TRANSACTION_TP: "Type: 15 individual · 15E earmarked memo · 22Y refund · 24T/24R earmarked/redesignated."
      ENTITY_TP: "Entity type (IND individual, etc.)."
      OTHER_ID: "Linked entity id (e.g. conduit), if any."
      IMAGE_NUM: "FEC image number."
      FILE_NUM: "FEC file number."
      TRAN_ID: "Filer-assigned transaction id."

  fact_independent_expenditures:
    grain: one row per independent-expenditure line (PK IE_ID = file_num-tran_id)
    description: |
      Independent expenditures — money spent BY a committee FOR/AGAINST a candidate,
      not given to them (FEC independent_expenditure file, a real CSV). Uncapped;
      this is where super-PAC power (AIPAC/UDP, Fairshake) shows up. Requires the
      AMNDT_IND='N' + committee-join filter (junk gotcha).
    columns:
      IE_ID: "PK. Synthetic = FILE_NUM || '-' || TRAN_ID (no native SUB_ID in source)."
      SPENDER_CMTE_ID: "Committee that made the expenditure (-> dim_committees.CMTE_ID)."
      TARGET_CAND_ID: "Candidate the spend is about (-> dim_candidates.CAND_ID). ~87% match this cycle's master."
      SUPPORT_OPPOSE: "'S' supports the target, 'O' opposes the target. Keep separate."
      AMOUNT: "Expenditure amount."
      EXPENDITURE_DT: "Date of the expenditure (blank/NULL on ~1,400 source rows — legitimately empty)."
      AGGREGATE_AMOUNT: "FEC running aggregate for the spender/target/cycle (do not sum across rows)."
      PURPOSE: "What the money bought (e.g. 'Media Placement')."
      PAYEE: "Vendor paid (the money goes here, NOT to the candidate)."
      SPENDER_NAME: "Spending committee name as filed."
      TARGET_CAND_NAME: "Target candidate name as filed (kept for unmatched ids)."
      ELECTION_TYPE: "Election the spend targets (P primary, G general, …)."
      DISSEMINATION_DT: "Date the communication was disseminated."
      IMAGE_NUM: "FEC image number."
      FILE_NUM: "FEC file number (part of PK; supersede-chain key)."
      TRAN_ID: "Filer transaction id (part of PK)."
      AMNDT_IND: "Amendment indicator: N original, A1/A2/… amendments. Filter N to avoid double-counting refilings."

# Raw cold-storage parquet. Generator lists their column counts + row counts live.
parquet:
  raw_cn.parquet: "Raw candidate master (FEC cn). Source of dim_candidates."
  raw_cm.parquet: "Raw committee master (FEC cm). Source of dim_committees."
  raw_ccl.parquet: "Raw candidate-committee linkages (FEC ccl). Source of bridge_candidate_committee."
  raw_pas2.parquet: "Raw committee->candidate transactions (FEC itpas2). Source of fact_contributions."
  raw_indiv.parquet: "Raw itemized individual contributions (FEC itcont). Source of fact_individual_contributions. Has MEMO_CD (not in curated table)."
  raw_ie.parquet: "Raw independent expenditures (FEC CSV). Source of fact_independent_expenditures. All 23 original columns as text."
